<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moonxi Board</title>
  <style>
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-chat: #0f3460;
      --text-primary: #e6e6e6;
      --text-secondary: #a0a0a0;
      --accent: #e94560;
      --user-bubble: #0d7377;
      --agent-bubble: #2d2d44;
      --border: #2d2d44;
      --sidebar-width: 280px;
      --detail-width: 300px;
      --transition-fast: 150ms ease;
      --transition-normal: 300ms ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    #app {
      height: 100vh;
    }

    .app {
      display: flex;
      height: 100vh;
      padding-bottom: 24px; /* statusbar height */
    }

    /* ===== Sidebar ===== */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width var(--transition-normal), min-width var(--transition-normal);
    }

    .sidebar.closed {
      width: 0;
      min-width: 0;
      border-right: none;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-header h2 {
      font-size: 16px;
      color: var(--text-primary);
    }

    .connection-status {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .sidebar-search {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }

    .search-input {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--accent);
    }

    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    /* Session groups */
    .session-groups {
      list-style: none;
    }

    .session-group {
      margin-bottom: 8px;
    }

    .session-group-header {
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .session-group-items {
      list-style: none;
    }

    /* Session items */
    .session-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 2px;
      transition: background var(--transition-fast);
    }

    .session-item:hover {
      background: var(--bg-primary);
    }

    .session-item.active {
      background: var(--accent);
      color: white;
    }

    .session-title-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .session-status-icon {
      font-size: 10px;
      flex-shrink: 0;
    }

    .session-title {
      font-size: 14px;
      font-weight: 500;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-star {
      font-size: 12px;
      flex-shrink: 0;
    }

    .session-preview {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .session-agent {
      flex: 1;
    }

    .unread-badge {
      background: var(--accent);
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 10px;
      min-width: 18px;
      text-align: center;
    }

    /* Sidebar footer */
    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
    }

    .btn-new-session {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: opacity var(--transition-fast);
    }

    .btn-new-session:hover {
      opacity: 0.85;
    }

    /* ===== Chat Panel ===== */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-chat);
      min-width: 0;
    }

    .chat-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-secondary);
    }

    .chat-title {
      font-size: 16px;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-toggle-sidebar,
    .btn-toggle-detail {
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background var(--transition-fast);
    }

    .btn-toggle-sidebar:hover,
    .btn-toggle-detail:hover {
      background: var(--bg-primary);
    }

    /* Messages */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .messages-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-secondary);
      font-size: 16px;
    }

    .bubble {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 12px;
      margin-bottom: 8px;
      font-size: 14px;
      line-height: 1.5;
    }

    .bubble-user {
      background: var(--user-bubble);
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }

    .bubble-agent {
      background: var(--agent-bubble);
      margin-right: auto;
      border-bottom-left-radius: 4px;
    }

    .bubble-role {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 4px;
      font-weight: 600;
    }

    .bubble-content p {
      margin: 0;
    }

    /* Tool calls */
    .tool-call {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin: 8px 0;
      font-size: 13px;
    }

    .tool-call-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      list-style: none;
    }

    .tool-call-header::-webkit-details-marker {
      display: none;
    }

    .tool-name {
      font-weight: 600;
      color: var(--accent);
    }

    .tool-status {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .tool-input {
      background: var(--bg-primary);
      padding: 8px 12px;
      border-radius: 0 0 8px 8px;
      font-size: 12px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      margin: 0;
    }

    /* Step indicators */
    .step-indicator {
      font-size: 12px;
      color: var(--text-secondary);
      padding: 4px 8px;
      margin: 4px 0;
      border-left: 2px solid var(--accent);
    }

    .step-start { border-left-color: #4CAF50; }
    .step-finish { border-left-color: #2196F3; }

    /* Chat input area */
    .chat-input {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: var(--bg-secondary);
    }

    .agent-selector {
      padding: 8px 10px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
      cursor: pointer;
      min-width: 120px;
    }

    .agent-selector:focus {
      border-color: var(--accent);
    }

    .input-text {
      flex: 1;
      padding: 10px 14px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 40px;
      max-height: 120px;
    }

    .input-text:focus {
      border-color: var(--accent);
    }

    .btn-send {
      padding: 10px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: opacity var(--transition-fast);
    }

    .btn-send:hover {
      opacity: 0.85;
    }

    /* ===== Detail Panel ===== */
    .detail-panel {
      width: var(--detail-width);
      min-width: var(--detail-width);
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
      animation: slideIn var(--transition-normal);
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .detail-header h3 {
      font-size: 16px;
      margin: 0;
    }

    .btn-close-detail {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .btn-close-detail:hover {
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    /* Agent detail */
    .agent-detail {
      margin-bottom: 16px;
    }

    .agent-detail-empty {
      text-align: center;
      padding: 24px 0;
      color: var(--text-secondary);
    }

    .agent-info-section,
    .agent-tools-section {
      margin-bottom: 16px;
    }

    .agent-info-section h4,
    .agent-tools-section h4 {
      font-size: 13px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
    }

    .info-label {
      color: var(--text-secondary);
    }

    .info-value {
      font-weight: 500;
    }

    .agent-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.4;
      margin-top: 8px;
    }

    /* Tools list */
    .tools-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .tool-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      font-size: 13px;
      border-radius: 4px;
    }

    .tool-item:hover {
      background: var(--bg-primary);
    }

    .tool-icon {
      font-size: 12px;
    }

    .no-tools {
      font-size: 13px;
      color: var(--text-secondary);
      font-style: italic;
    }

    /* Game stats */
    .game-stats {
      border-top: 1px solid var(--border);
      padding-top: 16px;
      margin-top: 16px;
    }

    .game-stats h3 {
      font-size: 14px;
      margin-bottom: 12px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 14px;
    }

    .stat-label {
      color: var(--text-secondary);
    }

    .stat-value {
      font-weight: 600;
    }

    .stat-value.combo {
      color: #FF9800;
    }

    /* ===== Status Bar ===== */
    .statusbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 24px;
      background: var(--accent);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 16px;
      font-size: 11px;
      color: white;
      z-index: 100;
    }

    /* ===== Utility ===== */
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-primary);
      background: var(--bg-secondary);
    }

    .btn:hover {
      opacity: 0.8;
    }

    .connecting {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-size: 18px;
      color: var(--text-secondary);
    }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }

    /* ===== Animations ===== */
    @keyframes messageSlideIn {
      from { transform: translateY(10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes comboPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); color: #FF9800; }
    }

    .bubble {
      animation: messageSlideIn 0.2s ease-out;
    }

    .session-item {
      animation: fadeIn 0.15s ease-out;
    }

    .stat-value.combo {
      transition: transform 0.2s ease;
    }

    .combo-active {
      animation: comboPulse 0.5s ease;
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 24px;
        z-index: 50;
        box-shadow: 2px 0 8px rgba(0, 0, 0, 0.3);
      }

      .sidebar.closed {
        transform: translateX(-100%);
      }

      .detail-panel {
        position: fixed;
        right: 0;
        top: 0;
        bottom: 24px;
        z-index: 50;
        box-shadow: -2px 0 8px rgba(0, 0, 0, 0.3);
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    // Load MoonBit compiled JS
    // Build output: _build/js/release/build/src.js (or debug)
    // For dev: use npx serve . and set correct path
  </script>
</body>
</html>
