---
apiVersion: v1
kind: ConfigMap
metadata:
  name: moonxi-board-nginx
  namespace: dev
data:
  default.conf: |
    server {
      listen 8080;
      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }

      location /api/ {
        proxy_pass http://moonxi-server.dev.svc.cluster.local:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /global/event {
        proxy_pass http://moonxi-server.dev.svc.cluster.local:8000/global/event;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: moonxi-board
  namespace: dev
  labels:
    app: moonxi-board
spec:
  replicas: 1
  selector:
    matchLabels:
      app: moonxi-board
  template:
    metadata:
      labels:
        app: moonxi-board
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:alpine
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: static-files
              mountPath: /usr/share/nginx/html
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: static-files
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: moonxi-board-nginx

---
apiVersion: v1
kind: Service
metadata:
  name: moonxi-board
  namespace: dev
spec:
  selector:
    app: moonxi-board
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: moonxi-board
  namespace: dev
spec:
  parentRefs:
    - name: traefik
      namespace: traefik
      sectionName: web
  hostnames:
    - board.liyuexi.cn
  rules:
    - backendRefs:
        - name: moonxi-board
          port: 80
